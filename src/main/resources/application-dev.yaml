spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  cloud:
    gateway:
      routes:
        - id: core-service
          uri: ${CORE_SERVICE_URL}
          predicates:
            - Path=/api/core/**
          filters:
            - StripPrefix=2
        - id: chat-service
          uri: ${CHAT_SERVICE_URL}
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=2
        - id: billing-service
          uri: ${BILLING_SERVICE_URL}
          predicates:
            - Path=/api/billing/**
          filters:
            - StripPrefix=2
        - id: fetcher-service
          uri: ${FETCHER_SERVICE_URL}
          predicates:
            - Path=/api/fetcher/**
          filters:
            - StripPrefix=2

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.ohmyopensource: DEBUG
    org.springframework.cloud.gateway: DEBUG