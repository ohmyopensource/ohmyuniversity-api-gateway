# ============================================================
# OhMyUniversity! - API Gateway
# Development profile.
#
# - Swagger UI enabled for local API exploration
# - Full actuator exposure for debugging
# - DEBUG logging for gateway and application code
# - OTel export disabled (no collector in dev)
# ============================================================

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      enabled: false

logging:
  level:
    org.ohmyopensource: DEBUG
    org.springframework.cloud.gateway: DEBUG