spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_dev_password

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.ohmyopensource: DEBUG
    org.springframework.cloud.gateway: DEBUG