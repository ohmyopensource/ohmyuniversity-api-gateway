# ============================================================
# OhMyUniversity! - API Gateway
# Production profile.
#
# - Swagger UI disabled (not exposed publicly)
# - Actuator limited to health and prometheus only
# - Health details hidden from external probes
# - Minimal logging - WARN root, INFO for application code
# - OTel export enabled - requires OTEL_EXPORTER_OTLP_ENDPOINT env var
# ============================================================

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  otlp:
    metrics:
      export:
        enabled: true
  tracing:
    export:
      enabled: true

logging:
  level:
    root: WARN
    org.ohmyopensource: INFO