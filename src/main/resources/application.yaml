# ============================================================
# OhMyUniversity! - API Gateway
# Base configuration - shared across all profiles.
#
# Routes are defined programmatically in GatewayRoutesConfig
# and injected via @Value with per-profile defaults.
# ============================================================

spring:
  profiles:
    default: dev
  application:
    name: ohmyuniversity-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.reactive.ReactiveOAuth2ResourceServerAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      enabled: false

fetcher:
  service:
    url: http://localhost:8084