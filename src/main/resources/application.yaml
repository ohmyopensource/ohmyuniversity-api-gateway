spring:
  profiles:
    default: dev
  application:
    name: ohmyuniversity-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always